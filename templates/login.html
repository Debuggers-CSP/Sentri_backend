<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PRC SOS - Member Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-xl shadow-2xl w-full max-w-md border-t-8 border-[#2d4f1e]">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-[#2d4f1e]">Member Login</h1>
            <p class="text-slate-500 mt-2">Access your secure SOS Dashboard</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <input type="text" name="username" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#2d4f1e]" placeholder="Enter username" required>
            </div>
            <div class="mb-8">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input type="password" name="password" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#2d4f1e]" placeholder="Enter password" required>
            </div>
            <button type="submit" class="w-full bg-[#2d4f1e] text-white font-bold py-3 rounded-lg hover:bg-green-900 transition duration-300 shadow-lg">
                Sign In
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-200 text-center">
            <p class="text-slate-600">New to the portal?</p>
            <a href="{{ url_for('register') }}" class="text-[#2d4f1e] font-bold hover:underline">Create an Account</a>
        </div>
    </div>
</body>
</html>
