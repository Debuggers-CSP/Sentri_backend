<!-- Simplified PRC SOS Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #2d4f1e;">
    <div class="container-fluid">
        <div class="d-flex align-items-center">
            <!-- Brand Link -->
            <a class="navbar-brand font-weight-bold" href="{{ url_for('index') }}">PRC SOS Navigator</a>
            
            <div class="navbar-nav ms-3">
                <a class="nav-link text-white" href="{{ url_for('index') }}">Home</a>
                {% if session.get('user_id') %}
                    <a class="nav-link text-white" href="{{ url_for('dashboard') }}">Dashboard</a>
                {% endif %}
            </div>
        </div>

        <div class="d-flex align-items-center">
            {% if session.get('user_id') %}
                <!-- If Logged In -->
                <span class="text-white me-3">Welcome, {{ session.get('username') }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
            {% else %}
                <!-- If Logged Out -->
                <a href="{{ url_for('login') }}" class="btn btn-outline-light btn-sm">Member Login</a>
            {% endif %}
        </div>
    </div>
</nav>
